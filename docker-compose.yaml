services:
  bot:
    env_file:
      - .env
    build:
      context: local
      dockerfile: Dockerfile
    volumes:
      - .:/app
    depends_on:
      - db
      - searxng
    environment:
      - TEMPORAL_CLI_ADDRESS=host.docker.internal:7233
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-http://searxng:8080}
      - SEARCH_TIMEOUT_SECONDS=${SEARCH_TIMEOUT_SECONDS:-10}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["php", "src/bot.php"]

  worker:
    env_file:
      - .env
    build:
      context: local
      dockerfile: Dockerfile
    volumes:
      - .:/app
    depends_on:
      - db
      - searxng
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SKIP_MIGRATIONS=true
      - TEMPORAL_CLI_ADDRESS=host.docker.internal:7233
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-http://searxng:8080}
      - SEARCH_TIMEOUT_SECONDS=${SEARCH_TIMEOUT_SECONDS:-10}
    entrypoint: ["/usr/local/bin/rr", "serve", "-c", "/app/.rr.yaml", "-w", "/app"]

  db:
    env_file:
      - .env
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_DATABASE
      POSTGRES_USER: $DB_USERNAME
    ports:
      - "35432:5432"
    volumes:
      - wtfhappendbot-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}' ]
      retries: 3
      timeout: 5s

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "38080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:38080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-local-searxng-secret-change-me}
      - FORCE_OWNERSHIP=false
    volumes:
      - ./config/searxng:/etc/searxng:ro

volumes:
  wtfhappendbot-pgsql:
    driver: local
