services:
  bot:
    env_file:
      - .env
    build:
      context: local
      dockerfile: Dockerfile
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - TEMPORAL_CLI_ADDRESS=host.docker.internal:7233
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: php src/bot.php

  worker:
    env_file:
      - .env
    build:
      context: local
      dockerfile: Dockerfile
    volumes:
      - .:/app
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SKIP_MIGRATIONS=true
    entrypoint: ./rr serve

  db:
    env_file:
      - .env
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_DATABASE
      POSTGRES_USER: $DB_USERNAME
    ports:
      - "35432:5432"
    volumes:
      - wtfhappendbot-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}' ]
      retries: 3
      timeout: 5s

volumes:
  wtfhappendbot-pgsql:
    driver: local
