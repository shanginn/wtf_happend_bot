imagePullSecrets:
  - name: dockerconfigjson-github-com

image:
  repository: ghcr.io/shanginn/wtf_happend_bot
  pullPolicy: Always
  tag: latest

serviceAccount:
  create: true
  name: "wtf-happend-bot"

deployment:
  replicas: 1

env:
  APP_NAME: wtf_happend_bot
  DB_HOST: pgsql-postgresql.pgsql
  DB_PORT: 5432
  DB_DATABASE: wtf_happend_bot
  DB_USERNAME: wtf_happend_bot
  # When searxng.enabled is true, the chart injects SEARCH_BASE_URL to the in-cluster SearXNG service.
  # Set SEARCH_BASE_URL here only when using an external SearXNG instance with searxng.enabled=false.
  SEARCH_TIMEOUT_SECONDS: 10
  TELEGRAM_BOT_USERNAME: wtf_happend_bot
  TEMPORAL_CLI_ADDRESS: temporal-frontend.temporal:7233
  TEMPORAL_NAMESPACE: wtf-happend-bot

envSecrets:
  DB_PASSWORD: ""
  SEARXNG_SECRET: "change-me-searxng-secret"
  TELEGRAM_BOT_TOKEN: ""
  OPENROUTER_API_KEY: ""
  DEEPSEEK_API_KEY: ""

searxng:
  enabled: true
  replicas: 1
  image: docker.io/searxng/searxng:latest
  imagePullPolicy: IfNotPresent
