{{- if .Values.searxng.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-searxng-config
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "WTF Happened Bot Search"

    search:
      safe_search: 1
      formats:
        - html
        - json

    server:
      secret_key: "change-me-searxng-secret"
      limiter: false
      image_proxy: false

    outgoing:
      request_timeout: 3.0
{{- end }}
